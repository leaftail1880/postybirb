name: i18n & Formatting CI
on:
  pull_request:

permissions:
  contents: write

jobs:
  main:
    runs-on: ubuntu-latest
    if: github.head_ref != 'weblate-postybirb-postybirb'
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - run: corepack enable

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable
        env:
          CYPRESS_INSTALL_BINARY: 0 # Skip downloading Cypress binary (not needed for CI)

      - name: Extract i18n keys
        run: yarn lingui:extract

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'ci(i18n): extract messages [skip ci]'
      - name: Run prettier
        run: yarn prettier -w ./

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'ci(i18n): format code [skip ci]'
